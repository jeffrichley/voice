[project]
name = "voice"
dynamic = ["version"]
description = "Pluggable TTS engine library with content-addressed cache, parallel generation, named voice registry, and mode-aware delivery for streaming and batch consumers."
license = "MIT"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/voice"]

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
fallback-version = "0.0.0"

[tool.uv]
cache-keys = [{ file = "pyproject.toml" }, { git = { commit = true, tags = true } }]
