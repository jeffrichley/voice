name: release

on:
  release:
    types: [published]
  # workflow_dispatch baked in from day 1 (v0.3.0 lesson). With the App-token
  # swap in release-please.yml, this should rarely be needed — events
  # authored by the App DO fire downstream workflows. Kept as belt-and-
  # suspenders for the rare case the auto-fire from `release.published`
  # misses.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build artifacts for (e.g. v0.3.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0
          fetch-tags: true

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: "3.12"

      - name: Build wheels
        run: uv build --all-packages --wheel --out-dir dist/

      - name: Export pinned requirements
        run: |
          uv export --frozen --no-dev --no-emit-workspace \
                    --no-hashes --format requirements-txt \
                    > dist/requirements.txt

      - name: List built artifacts
        run: ls -la dist/

      - name: Upload artifacts to GH Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          gh release upload "$TAG" dist/*.whl dist/requirements.txt --clobber

      # Stash the dist/ contents for the publish-pypi job. Only wheels —
      # requirements.txt is GH-Release-only; not a PyPI artifact.
      - name: Upload wheels as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl
          retention-days: 1
          if-no-files-found: error

  # Trusted Publisher (OIDC) — no PYPI_TOKEN secret needed. PyPI verifies
  # this workflow's identity via GitHub OIDC against the Pending Publisher
  # binding configured at:
  #   https://pypi.org/manage/project/madrigal/settings/publishing/
  # Binding shape: owner=jeffrichley, repo=voice, workflow=release.yml,
  # environment=pypi. The `pypi` environment is configured in voice repo
  # settings → Environments → pypi → restricted to branch=main + tag=v*.
  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheels from workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - name: List dist before publish
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
